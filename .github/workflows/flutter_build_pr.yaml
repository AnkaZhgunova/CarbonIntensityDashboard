name: Pull requests

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Pull request checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

